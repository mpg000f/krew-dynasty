name: Update Dynasty Rankings

on:
  schedule:
    - cron: '0 13 * * 1'  # Every Monday at 1pm UTC (9am ET)
  workflow_dispatch:       # Also triggerable manually from the Actions tab

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Generate rankings
        run: python model.py

      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/
          git diff --staged --quiet || (
            git commit -m "chore: update rankings $(date -u +'%Y-%m-%d')" &&
            git push
          )
